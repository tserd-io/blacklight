name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Core tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,api]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

  quickstart-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    env:
      LLM_PROVIDER: mock
      OLLAMA_BASE_URL: https://example.com
      TRACE_DB_PATH: .tmp/quickstart-smoke.sqlite3
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install README quickstart dependencies
        run: pip install -e ".[dev,api]"
      - name: Smoke README command - blacklight health
        run: blacklight health
      - name: Smoke README command - blacklight demo --verbose
        run: blacklight demo --verbose --trace-db-path "$TRACE_DB_PATH" --session-id ci-quickstart-demo
      - name: Smoke README command - blacklight eval run
        run: blacklight eval run --trace-db-path "$TRACE_DB_PATH" --session-id ci-quickstart-eval
      - name: Smoke provider command - blacklight providers list
        run: blacklight providers list
      - name: Smoke provider command - blacklight providers status
        run: blacklight providers status
      - name: Smoke local runtime command - blacklight local-model status
        run: blacklight local-model status

  package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    env:
      LLM_PROVIDER: mock
      OLLAMA_BASE_URL: https://example.com
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package validation tools
        run: pip install -e ".[dev]"
      - name: Build source and wheel distributions
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
      - name: Install built wheel
        run: pip install --force-reinstall dist/*.whl
      - name: Smoke installed console script
        run: blacklight health
      - name: Smoke packaged agent data
        run: python -c "from blacklight.agents import AgentRegistry; assert AgentRegistry().get('ticket_classifier_agent').agent_id == 'ticket_classifier_agent'"

  docker-smoke:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: blacklight-ci
      CONTAINER_NAME: blacklight-ci-smoke
    steps:
      - uses: actions/checkout@v7
      - name: Build Docker image
        run: docker build -t "$IMAGE_NAME" platform
      - name: Run Docker container in mock mode
        run: |
          docker run -d \
            --name "$CONTAINER_NAME" \
            -p 8000:8000 \
            -e LLM_PROVIDER=mock \
            -e LLM_MODEL=mock-ticket-classifier \
            -e OLLAMA_BASE_URL=https://example.com \
            "$IMAGE_NAME"
      - name: Smoke API health endpoint
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$CONTAINER_NAME"
          exit 1
      - name: Smoke classify endpoint
        run: |
          curl --fail --silent \
            -X POST http://127.0.0.1:8000/classify-ticket \
            -H "Content-Type: application/json" \
            -d '{"subject":"Refund request","body":"Customer asks for a refund after duplicate billing."}'
      - name: Show Docker logs
        if: always()
        run: docker logs "$CONTAINER_NAME" || true
      - name: Stop Docker container
        if: always()
        run: docker rm -f "$CONTAINER_NAME" || true
