name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev,api]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

  quickstart-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    env:
      LLM_PROVIDER: mock
      OLLAMA_BASE_URL: https://example.com
      TRACE_DB_PATH: .tmp/quickstart-smoke.sqlite3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install README quickstart dependencies
        run: pip install -e ".[dev,api]"
      - name: Smoke README command - blacklight health
        run: blacklight health
      - name: Smoke README command - blacklight demo --verbose
        run: blacklight demo --verbose --trace-db-path "$TRACE_DB_PATH" --session-id ci-quickstart-demo
      - name: Smoke README command - blacklight eval run
        run: blacklight eval run --trace-db-path "$TRACE_DB_PATH" --session-id ci-quickstart-eval
      - name: Smoke provider command - blacklight providers list
        run: blacklight providers list
      - name: Smoke provider command - blacklight providers status
        run: blacklight providers status
      - name: Smoke local runtime command - blacklight local-model status
        run: blacklight local-model status

  package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    env:
      LLM_PROVIDER: mock
      OLLAMA_BASE_URL: https://example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package validation tools
        run: pip install -e ".[dev]"
      - name: Build source and wheel distributions
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
      - name: Install built wheel
        run: pip install --force-reinstall dist/*.whl
      - name: Smoke installed console script
        run: blacklight health
      - name: Smoke packaged agent data
        run: python -c "from blacklight.agents import AgentRegistry; assert AgentRegistry().get('ticket_classifier_agent').agent_id == 'ticket_classifier_agent'"
