version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/platform"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      dev-dependencies:
        patterns:
          - "build"
          - "pytest"
          - "ruff"
          - "twine"
      runtime-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "build"
          - "pytest"
          - "ruff"
          - "twine"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
